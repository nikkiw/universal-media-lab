worker_processes auto;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events { worker_connections 4096; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /dev/stdout;
  sendfile on;
  keepalive_timeout 65;

  upstream origin_upstream { server origin:8080; keepalive 32; }
  upstream imgproxy_upstream { server imgproxy:8080; keepalive 32; }
  upstream wiremock_upstream { server wiremock:8080; keepalive 32; }

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    add_header X-Media-Lab "gateway" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range,Accept-Ranges,ETag,X-Media-Lab" always;

    location = /health {
      default_type text/plain;
      return 200 "ok\n";
    }

    location = / {
      try_files /index.html =404;
    }

    # Production-like media API generated by `make ingest`.
    location /api/ {
      proxy_pass http://origin_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
    }

    # Raw images/video/HLS/DASH.
    location /media/ {
      proxy_pass http://origin_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_force_ranges on;
    }

    location /cache/media/ {
      proxy_pass http://origin_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_force_ranges on;
    }

    location /no-range/media/ {
      proxy_pass http://origin_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
    }

    location /wrong-content-type/media/ {
      proxy_pass http://origin_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
    }

    # imgproxy URL examples:
    # /img/insecure/rs:fill:320:180/q:60/plain/local:///sample.jpg@webp
    # /img/insecure/rs:fill:720:1280/q:70/plain/local:///generated/video-id/poster.jpg@webp
    location /img/ {
      rewrite ^/img/(.*)$ /$1 break;
      proxy_pass http://imgproxy_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
    }

    # WireMock facade. It can proxy all media and add TTFB/body delays/faults.
    location /mock/ {
      rewrite ^/mock/(.*)$ /$1 break;
      proxy_pass http://wiremock_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
    }

    # Safe local access to WireMock admin API through the gateway.
    location /__wiremock/ {
      proxy_pass http://wiremock_upstream/__admin/;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }
  }
}
