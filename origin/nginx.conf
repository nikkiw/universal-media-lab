worker_processes auto;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events { worker_connections 4096; }

http {
  include /etc/nginx/media-lab-mime.types;
  default_type application/octet-stream;
  access_log /dev/stdout;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;


  server {
    listen 8080;
    server_name _;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range,Accept-Ranges,ETag,X-Media-Lab" always;
    add_header X-Media-Lab "origin" always;

    location = /health {
      default_type text/plain;
      return 200 "ok\n";
    }

    location = /api/v1/feed {
      alias /srv/media/catalog/v1/feed.json;
      default_type application/json;
      add_header Cache-Control "no-store" always;
      error_page 404 = @empty_feed;
    }

    location @empty_feed {
      default_type application/json;
      add_header Cache-Control "no-store" always;
      return 200 '{"version":1,"baseUrl":"","items":[]}';
    }

    location ~ ^/api/v1/media/([a-z0-9-]+)$ {
      alias /srv/media/catalog/v1/media/$1.json;
      default_type application/json;
      add_header Cache-Control "no-store" always;
    }

    # Default: uncached raw media with byte-range support.
    location /media/ {
      alias /srv/media/;
      autoindex on;
      add_header Cache-Control "no-store" always;
      add_header Accept-Ranges "bytes" always;
    }

    # Same files, cacheable. Useful for testing memory/disk/HTTP cache behavior.
    location /cache/media/ {
      alias /srv/media/;
      autoindex on;
      expires 1h;
      add_header Cache-Control "public, max-age=3600, immutable" always;
      add_header Accept-Ranges "bytes" always;
    }

    # Same files, but Range is disabled to exercise progressive MP4 fallback paths.
    location /no-range/media/ {
      alias /srv/media/;
      max_ranges 0;
      add_header Cache-Control "no-store" always;
      add_header Accept-Ranges "none" always;
    }

    # Intentionally wrong MIME type.
    location /wrong-content-type/media/ {
      alias /srv/media/;
      types { }
      default_type application/octet-stream;
      add_header Cache-Control "no-store" always;
    }

    # Prefixes preserved by WireMock proxy mappings.
    location ~ ^/(?:ttfb/[0-9]+|body/[0-9]+|random)/media/(.*)$ {
      alias /srv/media/$1;
      add_header Cache-Control "no-store" always;
      add_header Accept-Ranges "bytes" always;
    }
  }
}
